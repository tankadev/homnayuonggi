<section class="h-summary">
  <h3 class="h-card-title">
    <app-icon name="wallet" [size]="14"></app-icon> Tình hình của bạn
    <span class="right">Chick</span>
  </h3>

  <div class="h-summary-row">
    <div class="h-sum-tile owe-you">
      <span class="lbl">Mọi người nợ bạn</span>
      <span class="val"><span [appCountUp]="balance.totalOwedToMe"></span><span class="vnd-suffix">đ</span></span>
      <span class="sub">{{ balance.nOwedToMe }} người · {{ owedOrderCount }} đơn</span>
    </div>
    <div class="h-sum-tile you-owe">
      <span class="lbl">Bạn nợ mọi người</span>
      <span class="val"><span [appCountUp]="balance.totalIOwe"></span><span class="vnd-suffix">đ</span></span>
      <span class="sub">{{ balance.nIOwe }} người · {{ oweOrderCount }} đơn</span>
    </div>
  </div>

  <div class="h-summary-foot">
    <span class="net-l">
      <app-icon name="trend" [size]="12" [sw]="2"></app-icon> Số dư ròng
    </span>
    <span class="net-v" [class.neg]="balance.net < 0">
      {{ balance.net >= 0 ? '+' : '−' }}<span [appCountUp]="(balance.net | abs)"></span><span class="vnd-suffix">đ</span>
    </span>
  </div>
</section>
