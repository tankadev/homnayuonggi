<section class="h-card">
  <h3 class="h-card-title">
    <app-icon [name]="icon" [size]="14"></app-icon> {{ title }}
    <span class="right">{{ pairs.length }}</span>
  </h3>

  <div *ngIf="!pairs.length" class="h-pairs-empty">{{ emptyText }}</div>

  <ul *ngIf="pairs.length" class="h-pairs">
    <li *ngFor="let p of pairs" class="h-pair">
      <div class="h-pair-avatar">{{ p.member.initial }}</div>
      <div class="h-pair-info">
        <span class="nm">{{ p.member.name }}</span>
        <span class="sub">{{ p.unpaidOrders }} đơn chưa trả</span>
      </div>
      <div class="h-pair-amt">
        <span class="v" [class.pos]="isOwed" [class.neg]="!isOwed">
          {{ isOwed ? '+' : '−' }}{{ p.amt | abs | vnd }}<span>đ</span>
        </span>
        <span class="tag">{{ isOwed ? 'Nợ bạn' : 'Bạn nợ' }}</span>
      </div>
    </li>
  </ul>
</section>
