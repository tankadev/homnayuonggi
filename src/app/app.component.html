<div class="app">
  <ng-container *ngIf="mode === 'welcome'; else appShell">
    <app-welcome-page (authenticated)="onAuthenticated($event)"></app-welcome-page>
  </ng-container>

  <ng-template #appShell>
    <app-header
      [user]="user"
      [room]="room"
      [mode]="mode"
      (editRoom)="openEditRoom()"
      (leaveRoom)="leaveRoom()"
      (openHistory)="openHistory()"
      (backToRooms)="closeHistory()"
      (logout)="logout()"
    ></app-header>

    <div class="app-pages" [@page]="mode">
      <ng-container [ngSwitch]="mode">
        <app-rooms-page *ngSwitchCase="'rooms'" (enter)="enterRoom($event)"></app-rooms-page>

        <app-create-order-page
          *ngSwitchCase="'create-order'"
          [room]="room"
          (created)="onCreateOrder()"
        ></app-create-order-page>

        <app-place-order
          *ngSwitchCase="'place-order'"
          [room]="room"
          [editRoomTrigger]="editRoomTrigger"
          (roomChanged)="onRoomChanged($event)"
          (orderCompleted)="onOrderCompleted()"
        ></app-place-order>

        <app-payment-review-page
          *ngSwitchCase="'payment-review'"
          [room]="room"
          [roomName]="room?.name || ''"
          (newOrder)="onNewOrder()"
        ></app-payment-review-page>

        <app-history-page *ngSwitchCase="'history'"></app-history-page>
      </ng-container>
    </div>
  </ng-template>
</div>

<!-- Global toast outlet — ToastService.show() pushes messages here. -->
<app-toast-container></app-toast-container>
